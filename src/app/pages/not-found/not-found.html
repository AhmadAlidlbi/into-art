<section class="wrap">
  <div class="glyph" aria-hidden="true">404</div>

  <div class="content">
    <h1 class="title">{{ 'notFound.title' | translate }}</h1>
    <div class="actions">
      <a class="btn btn--primary" routerLink="/">{{ 'notFound.goHome' | translate }}</a>
      <a class="btn btn--secondary" routerLink="/book-consultation">{{ 'actions.book' | translate }}</a>
    </div>

    <button class="back" type="button" (click)="goBack()">
      <span class="back__arrow" aria-hidden="true">←</span>
      {{ 'notFound.goBack' | translate }}
    </button>
  </div>
</section>
