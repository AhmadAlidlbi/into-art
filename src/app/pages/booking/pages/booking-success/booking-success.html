<section class="page">
  <div class="container">
    <div class="card">
      <div class="check-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M5 13l4 4L19 7"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>

      <div class="eyebrow">{{ 'booking.success.badge' | translate }}</div>
      <h1 class="title">{{ 'booking.success.title' | translate }}</h1>
      <p class="subtitle">{{ 'booking.success.subtitle' | translate }}</p>

      <div class="actions">
        <a class="btn btn--primary" routerLink="/">{{ 'booking.success.backHome' | translate }}</a>
        <a
          class="btn btn--ghost"
          [routerLink]="viewProjectsLink.disabled ? null : viewProjectsLink.path"
          [attr.aria-disabled]="viewProjectsLink.disabled"
          [class.btn--disabled]="viewProjectsLink.disabled"
          (click)="viewProjectsLink.disabled && $event.preventDefault()"
        >
          {{ 'booking.success.viewProjects' | translate }}
        </a>
      </div>
    </div>
  </div>
</section>
