<section class="page">
  <div class="container">
    <div class="card">
      <div class="check-icon" aria-hidden="true">✓</div>
      <div class="eyebrow">{{ 'booking.success.badge' | translate }}</div>
      <h1 class="title">{{ 'booking.success.title' | translate }}</h1>
      <p class="subtitle">{{ 'booking.success.subtitle' | translate }}</p>

      <div class="actions">
        <a class="btn btn--primary" routerLink="/">{{ 'booking.success.backHome' | translate }}</a>
        <a class="btn btn--ghost" routerLink="/projects">{{ 'booking.success.viewProjects' | translate }}</a>
      </div>

      <p class="note">{{ 'booking.success.note' | translate }}</p>
    </div>
  </div>
</section>
