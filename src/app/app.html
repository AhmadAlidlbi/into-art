@if (!hideLayout()) {
  <app-header (mobileOpenChange)="isDrawerOpen.set($event)"></app-header>
  }
  
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
  
  @if (!hideLayout()) {
  <app-whatsapp-float
    [enabled]="!isDrawerOpen()"
    [number]="whatsappNumber"
    [message]="whatsappMessage()"
  ></app-whatsapp-float>
  
  <app-scroll-top [enabled]="!isDrawerOpen()" [bottomOffsetPx]="800"></app-scroll-top>
  
  <app-footer></app-footer>
  }
  
  <!-- Route navigation loader -->
  <app-route-loader [visible]="isRouteLoading()"></app-route-loader>
